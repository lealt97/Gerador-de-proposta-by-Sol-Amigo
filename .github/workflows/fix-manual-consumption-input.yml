name: Corrigir entrada manual de consumo

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/fix-manual-consumption-input.py'
      - '.github/workflows/fix-manual-consumption-input.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aplicar correção
        run: python .github/scripts/fix-manual-consumption-input.py

      - name: Commitar alteração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx tests/manual-average-consumption-regression.test.ts
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "fix: corrigir média mensal digitada manualmente"
          git push origin main
