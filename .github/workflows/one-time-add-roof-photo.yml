name: Aplicar foto do telhado

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-add-roof-photo
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar componente na aba 4
        run: python3 .github/scripts/apply-roof-photo-upload.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Foto do telhado já integrada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx
          git commit -m "feat: integrar foto do telhado à aba 4"
          git push origin HEAD:main
