name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PROFILE_AVATAR_APPLY_START
  apply-profile-avatar:
    name: Aplicar feature de foto de perfil
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/profile-avatar-navbar'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch da PR
        uses: actions/checkout@v4
        with:
          ref: feat/profile-avatar-navbar
          fetch-depth: 0

      - name: Aplicar alterações preparadas
        run: |
          python3 .github/scripts/apply-profile-avatar-core.py
          python3 .github/scripts/apply-profile-avatar-settings.py
          python3 .github/scripts/apply-profile-avatar-tests.py
          rm .github/scripts/apply-profile-avatar-core.py
          rm .github/scripts/apply-profile-avatar-settings.py
          rm .github/scripts/apply-profile-avatar-tests.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/quality.yml')
          content = path.read_text(encoding='utf-8')
          start = content.index('  # PROFILE_AVATAR_APPLY_START')
          end_marker = '  # PROFILE_AVATAR_APPLY_END\n'
          end = content.index(end_marker, start) + len(end_marker)
          path.write_text(content[:start] + content[end:], encoding='utf-8')
          PY

      - name: Commitar implementação
        run: |
          git config user.name "SolAmigo Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: adicionar foto de perfil na navbar"
          git push origin HEAD:feat/profile-avatar-navbar
  # PROFILE_AVATAR_APPLY_END

  quality:
    name: TypeScript completo, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        run: npm run check

  e2e:
    name: Playwright E2E — navegadores e dispositivos
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores e dependências
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Executar testes E2E
        run: npm run test:e2e

      - name: Publicar relatório do Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
