name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript completo, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        run: |
          set +e
          npm run check > validation.log 2>&1
          status=$?
          cat validation.log
          exit $status

      - name: Publicar saída das validações
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-isolation-validation
          path: validation.log
          retention-days: 1
