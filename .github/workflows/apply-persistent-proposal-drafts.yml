name: Aplicar rascunhos persistentes de proposta

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-persistent-proposal-drafts
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar persistência do fluxo
        run: python3 .github/scripts/apply-persistent-proposal-drafts.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "A persistência do fluxo já está aplicada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx src/pages/propostas/PaybackStep.tsx
          git commit -m "feat: salvar e retomar rascunhos do fluxo de proposta"
          git push origin HEAD:main
