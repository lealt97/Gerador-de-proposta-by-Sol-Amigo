name: Token público — validação ao vivo temporária

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-token-lifecycle:
    name: Validar token ativo, inválido, expirado e revogado
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EDGE_URL: https://ztlrnbailbcenkvtfoln.supabase.co/functions/v1/public-proposal-pdf
      ACTIVE_TOKEN: e0506ff7c77345808e5d2d817974759e
      EXPIRED_TOKEN: 64cac3714fd14ab092182a155cfdfcc0
      REVOKED_TOKEN: bcdfbfb7a1f94660acab5fd905eb7773
      INVALID_TOKEN: 00000000000000000000000000000000

    steps:
      - name: Executar contrato do ciclo de vida do token
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const assert = (condition, message) => {
            if (!condition) throw new Error(message);
          };

          const baseUrl = process.env.EDGE_URL;

          async function expectUnavailable(label, token) {
            const response = await fetch(`${baseUrl}?token=${token}`, {
              method: 'GET',
              redirect: 'manual',
            });

            assert(response.status === 404, `${label}: esperado 404, recebido ${response.status}`);
            assert(response.headers.get('cache-control') === 'no-store', `${label}: Cache-Control incorreto`);
            assert(response.headers.get('access-control-allow-origin') === '*', `${label}: CORS ausente`);
            assert((response.headers.get('content-type') || '').includes('application/json'), `${label}: Content-Type incorreto`);

            const body = await response.json();
            assert(body.error === 'Proposta não encontrada.', `${label}: resposta pública não é genérica`);
          }

          await expectUnavailable('token inválido', process.env.INVALID_TOKEN);
          await expectUnavailable('token expirado', process.env.EXPIRED_TOKEN);
          await expectUnavailable('token revogado', process.env.REVOKED_TOKEN);

          const active = await fetch(`${baseUrl}?token=${process.env.ACTIVE_TOKEN}`, {
            method: 'GET',
            redirect: 'manual',
          });

          assert(active.status === 302, `token ativo: esperado 302, recebido ${active.status}`);
          assert(active.headers.get('cache-control') === 'no-store', 'token ativo: Cache-Control incorreto');
          const location = active.headers.get('location');
          assert(location?.includes('/storage/v1/object/sign/proposals/'), 'token ativo: URL assinada ausente');

          const pdfResponse = await fetch(location, { redirect: 'follow' });
          assert(pdfResponse.status === 200, `PDF ativo: esperado 200, recebido ${pdfResponse.status}`);
          assert((pdfResponse.headers.get('content-type') || '').includes('application/pdf'), 'PDF ativo: Content-Type incorreto');

          const pdf = Buffer.from(await pdfResponse.arrayBuffer());
          assert(pdf.length >= 4096, `PDF ativo: arquivo muito pequeno (${pdf.length} bytes)`);
          assert(pdf.subarray(0, 5).toString('ascii') === '%PDF-', 'PDF ativo: cabeçalho inválido');
          assert(pdf.subarray(Math.max(0, pdf.length - 2048)).toString('latin1').includes('%%EOF'), 'PDF ativo: marcador final ausente');

          console.log(JSON.stringify({
            result: 'passed',
            unavailableStatuses: [404, 404, 404],
            activeStatus: active.status,
            pdfStatus: pdfResponse.status,
            pdfBytes: pdf.length,
          }));
          NODE
