name: Remover teste obsoleto de persistência

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-remove-obsolete-no-persistence-test
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remover teste incompatível
        run: python3 .github/scripts/remove-obsolete-no-persistence-test.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "O teste obsoleto já foi removido."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "test: remover regra obsoleta que proibia rascunhos"
          git push origin HEAD:main
