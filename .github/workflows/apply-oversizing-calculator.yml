# Execução única para diagnosticar o build da funcionalidade.
name: Diagnosticar build de oversizing

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-oversizing-calculator.yml'

permissions:
  contents: write

jobs:
  diagnose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Executar build e salvar log
        shell: bash
        run: |
          set +e
          npm ci > .github/oversizing-build.log 2>&1
          npm_ci_status=$?
          if [ "$npm_ci_status" -eq 0 ]; then
            npm run build >> .github/oversizing-build.log 2>&1
            build_status=$?
          else
            build_status=$npm_ci_status
          fi
          printf '\nEXIT_CODE=%s\n' "$build_status" >> .github/oversizing-build.log
          exit 0

      - name: Commitar log de diagnóstico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/oversizing-build.log
          git commit -m "chore: registrar diagnóstico do build de oversizing"
          git push origin main
